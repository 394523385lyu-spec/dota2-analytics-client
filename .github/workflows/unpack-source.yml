name: Unpack source payload

on:
  push:
    paths:
      - payload/source.tar.gz.b64.part.*
      - .github/workflows/unpack-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack source tree
        run: |
          test -d payload
          cat payload/source.tar.gz.b64.part.* > /tmp/source.tar.gz.b64
          base64 -d /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz
          rm -rf payload
          rm -f source.tar.gz.b64
          rm -f .github/workflows/unpack-source.yml
      - name: Commit unpacked source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Dota 2 analytics client source"
            git push
          fi
